<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>升學 AI 指令集 ｜ 陳坤平講師</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f6f1e7;
  --paper-2:#fbf8f1;
  --ink:#211b14;
  --ink-soft:#5a5044;
  --line:#e2d7c3;
  --line-2:#d6c8ad;
  --honey:#e0a106;
  --honey-deep:#b97c00;
  --honey-wash:#fdf2d0;
  --teal:#0f6b5f;
  --rose:#b5483b;
  --shadow:rgba(54,40,18,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Noto Sans TC",sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.75;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(circle at 12% 8%, rgba(224,161,6,.06), transparent 40%),
    radial-gradient(circle at 88% 92%, rgba(15,107,95,.05), transparent 42%);
}

/* ---------- Header ---------- */
header{
  position:relative;
  padding:54px 24px 40px;
  text-align:center;
  border-bottom:2px solid var(--line-2);
  overflow:hidden;
}
header::before{
  content:"";
  position:absolute;inset:0;
  background-image:repeating-linear-gradient(90deg,transparent 0 38px,rgba(54,40,18,.025) 38px 39px);
  pointer-events:none;
}
.eyebrow{
  display:inline-block;
  letter-spacing:.42em;
  font-size:.72rem;
  font-weight:700;
  color:var(--honey-deep);
  padding:6px 18px;
  border:1px solid var(--line-2);
  border-radius:999px;
  background:var(--paper-2);
  margin-bottom:22px;
}
header h1{
  font-family:"Noto Serif TC",serif;
  font-weight:900;
  font-size:clamp(2rem,5.5vw,3.4rem);
  letter-spacing:.04em;
  line-height:1.2;
  position:relative;
}
header h1 .hl{
  background:linear-gradient(180deg,transparent 58%,var(--honey-wash) 58%);
  padding:0 .15em;
}
header .sub{
  margin-top:16px;
  color:var(--ink-soft);
  font-size:1.02rem;
  letter-spacing:.05em;
}
.credit{
  margin-top:24px;
  display:inline-flex;
  align-items:center;
  gap:10px;
  font-size:.92rem;
  color:var(--ink);
  background:var(--paper-2);
  border:1.5px solid var(--honey);
  padding:8px 20px;
  border-radius:999px;
  box-shadow:0 4px 14px var(--shadow);
}
.credit .seal{
  width:26px;height:26px;border-radius:50%;
  background:var(--honey);color:#fff;
  display:grid;place-items:center;font-weight:700;font-size:.78rem;
  font-family:"Noto Serif TC",serif;
}
.credit b{font-weight:700;color:var(--honey-deep)}

/* ---------- Controls ---------- */
.controls{
  position:sticky;top:0;z-index:50;
  background:rgba(246,241,231,.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
  padding:16px 20px;
}
.controls-inner{max-width:1180px;margin:0 auto}
.search-wrap{position:relative;max-width:560px;margin:0 auto 14px}
.search-wrap svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--ink-soft)}
#search{
  width:100%;
  font-family:inherit;font-size:1rem;
  padding:13px 18px 13px 46px;
  border:1.5px solid var(--line-2);
  border-radius:14px;
  background:var(--paper-2);
  color:var(--ink);
  transition:border-color .2s, box-shadow .2s;
}
#search:focus{outline:none;border-color:var(--honey);box-shadow:0 0 0 4px var(--honey-wash)}
.tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.tab{
  font-family:inherit;font-size:.9rem;font-weight:500;
  padding:8px 16px;border-radius:999px;cursor:pointer;
  border:1.5px solid var(--line-2);
  background:var(--paper-2);
  color:var(--ink-soft);
  transition:all .18s;
  display:flex;align-items:center;gap:7px;
}
.tab .count{font-size:.74rem;opacity:.7;background:var(--line);border-radius:999px;padding:1px 8px}
.tab:hover{border-color:var(--honey);color:var(--ink)}
.tab.active{background:var(--ink);color:var(--paper-2);border-color:var(--ink)}
.tab.active .count{background:rgba(255,255,255,.18);color:var(--paper-2)}

/* ---------- Layout ---------- */
main{max-width:1180px;margin:0 auto;padding:40px 20px 80px}
.section{margin-bottom:56px;scroll-margin-top:150px}
.section-head{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.section-head .num{
  font-family:"Noto Serif TC",serif;font-weight:900;
  font-size:1.4rem;color:var(--honey);
}
.section-head h2{
  font-family:"Noto Serif TC",serif;font-weight:700;
  font-size:1.7rem;letter-spacing:.03em;
}
.section-desc{color:var(--ink-soft);font-size:.95rem;margin-bottom:22px;border-left:3px solid var(--honey);padding-left:12px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:18px}

/* ---------- Card ---------- */
.card{
  background:var(--paper-2);
  border:1px solid var(--line-2);
  border-radius:16px;
  padding:20px 20px 16px;
  display:flex;flex-direction:column;
  box-shadow:0 2px 10px rgba(54,40,18,.05);
  transition:transform .18s, box-shadow .18s, border-color .18s;
  position:relative;
}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 26px var(--shadow);border-color:var(--honey)}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.step-badge{
  font-family:"Noto Serif TC",serif;font-weight:700;font-size:.78rem;
  color:#fff;background:var(--teal);
  padding:3px 11px;border-radius:7px;letter-spacing:.04em;
}
.card h3{font-size:1.08rem;font-weight:700;line-height:1.4}
.card .note{
  font-size:.82rem;color:var(--honey-deep);
  background:var(--honey-wash);border-radius:8px;
  padding:6px 11px;margin-bottom:12px;
  display:flex;gap:7px;align-items:flex-start;
}
.card .note::before{content:"※";font-weight:700}
.prompt-box{
  background:#fffdf7;
  border:1px dashed var(--line-2);
  border-radius:11px;
  padding:14px 15px;
  font-size:.9rem;line-height:1.85;
  color:var(--ink);
  white-space:pre-wrap;
  max-height:230px;overflow-y:auto;
  flex:1;margin-bottom:14px;
}
.prompt-box::-webkit-scrollbar{width:8px}
.prompt-box::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:99px}
.prompt-box .kw{
  background:linear-gradient(180deg,transparent 55%,#ffd98a 55%);
  font-weight:500;border-radius:2px;
}
.copy-btn{
  font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;
  border:1.5px solid var(--ink);
  background:var(--ink);color:var(--paper-2);
  padding:10px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .18s;
}
.copy-btn:hover{background:var(--honey-deep);border-color:var(--honey-deep)}
.copy-btn.done{background:var(--teal);border-color:var(--teal)}
.copy-btn svg{width:16px;height:16px}

.empty{text-align:center;padding:70px 20px;color:var(--ink-soft)}
.empty .big{font-family:"Noto Serif TC",serif;font-size:1.4rem;margin-bottom:8px}

/* ---------- Footer ---------- */
footer{
  border-top:2px solid var(--line-2);
  padding:34px 20px 48px;
  text-align:center;color:var(--ink-soft);font-size:.88rem;
  background:var(--paper-2);
}
footer b{color:var(--honey-deep)}
.tip{
  max-width:680px;margin:0 auto 18px;
  background:var(--honey-wash);border:1px solid var(--line-2);
  border-radius:12px;padding:14px 18px;text-align:left;color:var(--ink);
  font-size:.88rem;
}
.tip b{color:var(--honey-deep)}

/* toast */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--paper-2);
  padding:12px 24px;border-radius:12px;font-weight:500;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  opacity:0;pointer-events:none;transition:all .25s;z-index:200;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:560px){
  .grid{grid-template-columns:1fr}
  header{padding:40px 18px 32px}
}
</style>
</head>
<body>

<header>
  <span class="eyebrow">課業 ｜ 自主學習 ｜ 學習歷程 ｜ 備審面試</span>
  <h1>升學 <span class="hl">AI 指令集</span> 提示詞庫</h1>
  <p class="sub">依步驟複製貼上，把橘底關鍵字換成你的，立即生成高品質升學素材</p>
  <div class="credit">
    <span class="seal">陳</span>
    本指令集由 <b>陳坤平講師</b> 原創製作
  </div>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="搜尋提示詞、步驟或關鍵字（例如：反思、面試、摘要、地理）" autocomplete="off">
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
</div>

<main id="main"></main>

<footer>
  <div class="tip">
    <b>使用方式：</b>依照各分類的 Step 順序，逐一點擊「複製提示詞」貼到你慣用的 AI 工具（ChatGPT、Claude、Gemini 等），
    再把句中<span style="background:#ffd98a;padding:0 3px;border-radius:2px;">高亮的關鍵字</span>替換成你自己的科系、課程或主題即可。部分步驟需先上傳檔案或開啟網頁搜尋／NotebookLM。
  </div>
  本提示詞庫內容皆為 <b>陳坤平講師</b> 原創，僅供學習與升學輔導使用，請尊重原作者著作權。<br>
  整理為可瀏覽、可搜尋、可複製之網頁形式。
</footer>

<div id="toast">已複製到剪貼簿 ✓</div>

<script>
/* ============ 提示詞資料 ============ */
/* {kw} 標記為原 PDF 中需自行替換的橘底關鍵字 */
const DATA = [
{
  id:"portfolio", num:"01", name:"學習歷程檔案",
  desc:"課程學習成果與多元表現：從預學習、反思撰寫、凸顯能力、圖表建議到摘要與發表會的完整流程。",
  items:[
    {step:"Step 0",title:"預學習與連結",
      prompt:`我是一位高二學生，正在學習『{地理探究與實作：水域太陽光電的可行性與環境影響}』
學期末需要進行期末報告
我希望有更好的學習效果，請列出：
1. 為什麼我要學這個？三個與個人發展或生活相關的原因；找到幾個資料來源來讓我更想學，並附上特定公開資料頁面連結（不要只有網站連結）
2. 我一定要從中學到的三個知識/技術點和觀念，請深入列出
3. 學習這段時常見的盲點有哪些？
4. 面對期末考試或成果報告發表，我應該注意哪些事？
請都簡單舉例`},
    {step:"Step 1",title:"科系分析與主題發想",note:"記得開啟網頁搜尋",
      prompt:`我是{OO科}高三學生，未來想上{XX大學國際商務系}，我正要寫學習歷程檔案
本系要上傳的項目為：{專題實作、實習學習成果、社團、幹部、檢定與競賽}

請從這些項目，幫我分析會受本校系青睞的書審資料，當中應該突顯出什麼能力？

並從課內的學科課章節，或課外各種活動幫我發想
我可以做哪些主題的學習歷程檔案？`},
    {step:"Step 2",title:"學習經驗與科系",
      prompt:`我正在學習『{國文課-出師表}』
我以後想申請{傳播}相關科系

這份檔案內容與未來志向有哪些關係？`},
    {step:"Step 2-1",title:"反思架構（4F／ORID）",
      prompt:`請以 4F 反思法或 ORID 反思法，為我撰寫一段（『{國文課-出師表}』）的學習反思
用來申請{傳播}相關科系，需突出科系所需的核心素養

總長度 500 字以內
第一段 Facts 需佔 50％ 內容，並談及相關的學理、知識和技術`},
    {step:"Step 2-1",title:"特色內容（SMART）",
      prompt:`我想讓這份學習歷程的內容更有個人特色，請以上文為基礎，再修改三個元素
一、關於這個主題，我印象最深刻的地方是：{明明劉禪不太行，為什麼諸葛亮不自己取代？}
二、學習過程中，我曾經遇到困難或失敗的地方是：{三國人名太多，歷史太雜，記不起來}
三、我還想更深入學習的地方是：{在歷史中，有哪些皇帝托孤的事件，這類事件對文化造成什麼影響？}

字數在 600 字左右
並讓我的文字符合 SMART 法則，增加文章的具體性，但不用將 SMART 列點呈現

如果有內容不清的地方，請先問我問題
到你覺得足夠清楚，就可以產出`},
    {step:"Step 3",title:"凸顯個人能力",
      prompt:`我希望本份學習歷程檔案，可以更凸顯個人能力和特色，我需要給你哪些資訊？請列出 3-5 點，讓我簡單回答
請特別引導我回答出關鍵的知識點、數據、技能或經驗中的關鍵時刻，可以透過追問，幫助我的回應符合 SMART 法則；目的是要自然凸顯我的能力和與科系的適配性

當我答完，請依照我的答案，幫我重寫我的心得反思`},
    {step:"Step 3-1",title:"拉出整體架構",
      prompt:`請轉化以上內容，照「總論概述、分項重點、統整結論」的結構重新寫一遍

第一段總論概述，用與生活相關的提問或我的個人故事，來激發讀者興趣；但這只是我的個人經歷，是備審資料而非廣告文案，不必太行銷導向

第二段依照我的學習經驗，深度寫出三個重點
1. 我學到哪些主要的知識/技術點？這是什麼？我如何學到？特別需要加入一些數據討論
2. 我用了什麼學習法？是否有遇到困難、我如何突破、再來一次我如何學得更好？
3. 過程中我做了什麼、突破哪些困難，體現出哪些良好的學習態度？這對我有哪些幫助？

第三段就是 4F 反思法中的 Future，未來打算怎麼應用或深入學習，以及我具備哪些能力
整段文字請在 600 字內寫完`},
    {step:"Step 4",title:"圖表建議",
      prompt:`我想讓本篇反思更有可看性，請根據本篇內容，建議我要放哪些圖表、哪些照片？`},
    {step:"Step 4-1",title:"圖表判讀與反思",note:"先上傳數據圖片",
      prompt:`這是我自然探究實作課的實驗數據表，實驗是要測試{不同頻率(Hz)的音源，對人耳聽力距離的影響}？；圖中有三位男生、三位女生受測者，{男一受測者可在距離 18m 處，聽見 120Hz 的聲音；而要 200Hz 的聲音，最遠只能在 21m 處聽見}

請從三個點協助我反思與延伸：
一、針對實驗主題，這組數據體現出了哪些事？有哪些學說或理論可以解釋？越深入討論越好
二、實驗設計可能哪裡有問題？如果再做一次，我可以如何提升實驗的精細度與準確率？為什麼？
三、這個實驗與其中的原理知識，在生活或產業中，有哪些可以進一步應用的地方？請列出三個相關的實際案例
如果對實驗內容有不清楚的地方，先對我提問，直到我的答案足夠判讀，再開始正式回答我`},
    {step:"Step 4-3",title:"學檔與科系連結",
      prompt:`我想申請{醫學與生醫工程學系}，請就上述成果，分別建議我深入探討的方向`},
    {step:"Step 5",title:"撰寫摘要",
      prompt:`請就以上討論內容，為我撰寫首頁的摘要
使用以下架構（可視不同經驗微調），限 200-250 字，需分段
文中需放入一個重點數據

本次學習活動的主題是【？】
我之所以進行這項探索/學習，是因為【？】
在過程中，我透過【？】進行資料蒐集或實作
最後，我發現【？】，並因此學到【？】
關鍵詞：【？】`},
    {step:"Step 6",title:"百字簡述",
      prompt:`根據以上內容，幫我撰寫 80 字以內之簡述，目的是讓教授看見我的特質和能力，並期待閱讀這份學習歷程檔案

整體結構可參考黃金圈法則，但不需提及 Why.how.what 等詞，行文通順即可
文中強調故事性，可能從學習動機、成果或學習過程而來；若可以，列出數據
如果相關資訊不清楚，可追問 1-2 次；如果資訊已經完整，則可直接產出
請列出三個版本`},
    {step:"Step 6-1",title:"深入學習",note:"先傳上 PDF 檔",
      prompt:`請針對檔案中的內容，從大學教授的角度，用提問的方式，確認我對這段學習經歷的理解，是否足夠深？是否有掌握核心的知識、技術或態度？

請先問一題，等我回答之後，先根據我的回答給出一些學習建議，再接著問下一題
直到把這份檔案的內容都確認完，幫我把所有學習建議總結一遍後，就可以結束`},
    {step:"Step 7",title:"針對科系撰寫：轉寫",
      prompt:`我想用上述的學習歷程，改為申請{心理學系}
請改寫原文中的「心得反思」部分，凸顯{心理學系}需要的能力和素養`},
    {step:"Step 7-1",title:"針對科系撰寫 2（optional）",
      prompt:`請扮演大學教授的角色，給我建議
除了心得反思，我還能做出哪些修改，讓這份檔案更符合{心理學系}？`},
    {step:"Step 8",title:"學習歷程發表會",
      prompt:`我是一位高二學生
我要準備自己的學習歷程發表會，以這份檔案為主軸
請扮演學習歷程和簡報表達專家，用一對一問答的方式，幫助我進行預備。

/* ============ 渲染 ============ */
const main=document.getElementById('main');
const tabsEl=document.getElementById('tabs');
const searchEl=document.getElementById('search');
let activeCat='all';

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// 將 {關鍵字} 轉為高亮 span，並保留原文（去掉大括號）
function renderPrompt(text){
  let html=escapeHtml(text);
  html=html.replace(/\{([^}]+)\}/g,'<span class="kw">$1</span>');
  return html;
}
// 取得純文字（複製用，去掉大括號）
function plainPrompt(text){return text.replace(/\{([^}]+)\}/g,'$1');}

// tabs
function buildTabs(){
  const total=DATA.reduce((a,c)=>a+c.items.length,0);
  let html=`<button class="tab active" data-cat="all">全部<span class="count">${total}</span></button>`;
  DATA.forEach(c=>{
    html+=`<button class="tab" data-cat="${c.id}">${c.num}・${c.name}<span class="count">${c.items.length}</span></button>`;
  });
  tabsEl.innerHTML=html;
  tabsEl.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      activeCat=t.dataset.cat;
      tabsEl.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      render();
      if(activeCat!=='all'){
        const sec=document.getElementById('sec-'+activeCat);
        if(sec) sec.scrollIntoView({behavior:'smooth',block:'start'});
      }else{window.scrollTo({top:0,behavior:'smooth'});}
    });
  });
}

function render(){
  const q=searchEl.value.trim().toLowerCase();
  let html='';
  let anyResult=false;
  DATA.forEach(cat=>{
    if(activeCat!=='all' && activeCat!==cat.id) return;
    const items=cat.items.filter(it=>{
      if(!q) return true;
      return (it.title+it.step+it.prompt+cat.name+(it.note||'')).toLowerCase().includes(q);
    });
    if(items.length===0) return;
    anyResult=true;
    html+=`<section class="section" id="sec-${cat.id}">
      <div class="section-head"><span class="num">${cat.num}</span><h2>${cat.name}</h2></div>
      <p class="section-desc">${cat.desc}</p>
      <div class="grid">`;
    items.forEach((it,i)=>{
      const pid=cat.id+'-'+i;
      html+=`<div class="card">
        <div class="card-top">
          <span class="step-badge">${it.step}</span>
          <h3>${it.title}</h3>
        </div>
        ${it.note?`<div class="note">${it.note}</div>`:''}
        <div class="prompt-box">${renderPrompt(it.prompt)}</div>
        <button class="copy-btn" data-id="${pid}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          複製提示詞
        </button>
      </div>`;
      // 暫存純文字
      promptStore[pid]=plainPrompt(it.prompt);
    });
    html+=`</div></section>`;
  });
  if(!anyResult){
    html=`<div class="empty"><div class="big">找不到符合「${escapeHtml(searchEl.value)}」的提示詞</div>試試其他關鍵字，或切換上方分類。</div>`;
  }
  main.innerHTML=html;
  bindCopy();
}

const promptStore={};
function bindCopy(){
  main.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const text=promptStore[btn.dataset.id];
      try{
        await navigator.clipboard.writeText(text);
      }catch(e){
        const ta=document.createElement('textarea');
        ta.value=text;document.body.appendChild(ta);ta.select();
        document.execCommand('copy');document.body.removeChild(ta);
      }
      btn.classList.add('done');
      const orig=btn.innerHTML;
      btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg> 已複製！';
      showToast();
      setTimeout(()=>{btn.classList.remove('done');btn.innerHTML=orig;},1600);
    });
  });
}

let toastTimer;
function showToast(){
  const t=document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1600);
}

searchEl.addEventListener('input',render);
buildTabs();
render();
</script>
