<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課諮師AI研習簡報</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #4f8ef7;
    --accent2: #6eb5ff;
    --text: #e8eaf0;
    --text-muted: #8b92a8;
    --border: #2e3348;
    --green: #3ecf8e;
    --orange: #f79a4f;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── Header ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 22px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
    gap: 12px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }

  .home-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    text-decoration: none;
  }
  .home-btn:hover { border-color: var(--accent); color: var(--accent2); }

  .header-title {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--accent2);
    white-space: nowrap;
  }

  .header-meta {
    font-size: 0.76rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  /* ─── Auto-play controls ─── */
  .autoplay-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 12px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1.5px solid var(--border);
  }

  .autoplay-bar label {
    font-size: 0.74rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .speed-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.76rem;
    padding: 3px 6px;
    border-radius: 5px;
    cursor: pointer;
  }

  .play-btn {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .play-btn:hover { background: var(--accent2); }
  .play-btn.playing { background: var(--orange); }

  /* progress bar */
  .progress-bar-wrap {
    width: 80px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
  }

  .fs-btn {
    padding: 7px 16px;
    border-radius: 8px;
    border: 1.5px solid var(--accent);
    background: transparent;
    color: var(--accent2);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .fs-btn:hover { background: var(--accent); color: #fff; }

  /* ─── Main Layout ─── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── Left Panel (65%) ─── */
  .panel-left {
    width: 65%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 20px;
    background: #0c0e18;
    border-right: 1px solid var(--border);
    position: relative;
  }

  .slide-image-wrap {
    width: 100%;
    max-width: 860px;
    aspect-ratio: 16/9;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    background: #000;
  }

  .slide-image-wrap img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .slide-nav {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 14px;
  }

  .nav-btn {
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .slide-counter {
    font-size: 0.82rem;
    color: var(--text-muted);
    min-width: 60px;
    text-align: center;
    letter-spacing: 0.06em;
  }

  /* ─── Right Panel (35%) ─── */
  .panel-right {
    width: 35%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .speech-header {
    padding: 13px 20px 9px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }

  .speech-slide-num {
    font-size: 0.68rem;
    color: var(--green);
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .speech-title {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
  }

  .speech-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px 20px 24px;
    line-height: 1.95;
    font-size: 0.9rem;
    color: #cdd0de;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .speech-body::-webkit-scrollbar { width: 4px; }
  .speech-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .speech-body p { margin-bottom: 1em; }
  .speech-body p:last-child { margin-bottom: 0; }

  /* ─── Thumbnail strip ─── */
  .thumb-strip {
    height: 66px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 7px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .thumb-strip::-webkit-scrollbar { height: 3px; }
  .thumb-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .thumb {
    width: 74px; height: 48px;
    flex-shrink: 0;
    border-radius: 5px;
    overflow: hidden;
    border: 2px solid transparent;
    cursor: pointer;
    transition: border-color 0.2s;
    background: #000;
  }
  .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .thumb.active { border-color: var(--accent); }
  .thumb:hover { border-color: var(--accent2); }

  /* ─── Fullscreen Overlay ─── */
  #fullscreen-overlay {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #fullscreen-overlay.active { display: flex; }

  #fs-img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
  }

  #fs-nav-left, #fs-nav-right {
    position: fixed;
    top: 50%; transform: translateY(-50%);
    width: 52px; height: 52px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: none; color: #fff; font-size: 1.3rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    z-index: 10000;
  }
  #fs-nav-left:hover, #fs-nav-right:hover { background: rgba(255,255,255,0.28); }
  #fs-nav-left { left: 16px; }
  #fs-nav-right { right: 16px; }

  #fs-toolbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 52px;
    background: rgba(0,0,0,0.72);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 10000;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #fullscreen-overlay:hover #fs-toolbar,
  #fs-toolbar:hover { opacity: 1; pointer-events: auto; }

  .fs-tool-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .fs-tool-btn:hover { background: rgba(255,255,255,0.22); }
  .fs-tool-btn.playing { background: rgba(247,154,79,0.5); border-color: var(--orange); }

  .fs-speed-select {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    font-size: 0.76rem;
    padding: 5px 8px;
    border-radius: 5px;
    cursor: pointer;
  }

  .fs-counter-text {
    font-size: 0.76rem;
    color: rgba(255,255,255,0.55);
    min-width: 50px;
    text-align: center;
    letter-spacing: 0.06em;
  }

  #fs-close {
    position: fixed; top: 16px; right: 20px;
    background: rgba(255,255,255,0.12);
    border: none; color: #fff; font-size: 1rem;
    width: 38px; height: 38px; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s; z-index: 10000;
  }
  #fs-close:hover { background: rgba(255,255,255,0.28); }

  .fs-progress-wrap {
    width: 100px; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px; overflow: hidden;
  }
  .fs-progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
  }

  /* ─── Footer ─── */
  .footer-info {
    padding: 6px 22px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 0.7rem;
    color: var(--text-muted);
    text-align: center;
    flex-shrink: 0;
  }

  @media (max-width: 900px) {
    body { overflow: auto; }
    .main { flex-direction: column; height: auto; }
    .panel-left, .panel-right { width: 100%; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
    .header-meta { display: none; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-left">
    <button class="home-btn" onclick="goHome()">⌂ 首頁</button>
    <div class="header-title">課諮師 AI 研習簡報</div>
    <div class="header-meta">臺北市立麗山高中・林獻升老師</div>
  </div>

  <div class="header-controls">
    <!-- Auto-play bar -->
    <div class="autoplay-bar">
      <label>自動播放</label>
      <select class="speed-select" id="speed-select" onchange="updateSpeed()">
        <option value="3">3 秒</option>
        <option value="5" selected>5 秒</option>
        <option value="8">8 秒</option>
        <option value="10">10 秒</option>
        <option value="15">15 秒</option>
        <option value="20">20 秒</option>
      </select>
      <div class="progress-bar-wrap" title="播放進度">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <button class="play-btn" id="play-btn" onclick="togglePlay()" title="播放 / 暫停">▶</button>
    </div>

    <button class="fs-btn" onclick="enterFullscreen()">⛶ 全螢幕播放</button>
  </div>
</header>

<!-- Main -->
<div class="main">

  <!-- Left: Slide Image (65%) -->
  <div class="panel-left">
    <div class="slide-image-wrap">
      <img id="main-slide" src="" alt="投影片">
    </div>
    <div class="slide-nav">
      <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">&#8592;</button>
      <div class="slide-counter" id="counter">1 / 34</div>
      <button class="nav-btn" id="btn-next" onclick="navigate(1)">&#8594;</button>
    </div>
  </div>

  <!-- Right: Speech (35%) -->
  <div class="panel-right">
    <div class="speech-header">
      <div class="speech-slide-num" id="speech-num">SLIDE 01</div>
      <div class="speech-title" id="speech-title"></div>
    </div>
    <div class="speech-body" id="speech-body"></div>
  </div>

</div>

<!-- Thumbnail Strip -->
<div class="thumb-strip" id="thumb-strip"></div>

<!-- Footer -->
<div class="footer-info">臺北市立麗山高中 林獻升老師 ｜ 課諮師 AI 科技輔助與適性輔導實務研習</div>

<!-- Fullscreen Overlay -->
<div id="fullscreen-overlay">
  <button id="fs-close" onclick="exitFullscreen()">✕</button>
  <button id="fs-nav-left" onclick="fsNavigate(-1)">&#8592;</button>
  <img id="fs-img" src="" alt="">
  <button id="fs-nav-right" onclick="fsNavigate(1)">&#8594;</button>

  <!-- Fullscreen toolbar (hover to show) -->
  <div id="fs-toolbar">
    <span class="fs-counter-text" id="fs-counter-text">1 / 34</span>
    <button class="fs-tool-btn" id="fs-prev-btn" onclick="fsNavigate(-1)">← 上一張</button>
    <button class="fs-tool-btn fs-play-btn" id="fs-play-btn" onclick="togglePlay()">▶ 自動播放</button>
    <select class="fs-speed-select" id="fs-speed-select" onchange="updateSpeedFromFs()">
      <option value="3">3 秒</option>
      <option value="5" selected>5 秒</option>
      <option value="8">8 秒</option>
      <option value="10">10 秒</option>
      <option value="15">15 秒</option>
      <option value="20">20 秒</option>
    </select>
    <div class="fs-progress-wrap">
      <div class="fs-progress-fill" id="fs-progress-fill"></div>
    </div>
    <button class="fs-tool-btn" id="fs-next-btn" onclick="fsNavigate(1)">下一張 →</button>
    <button class="fs-tool-btn" onclick="exitFullscreen()">✕ 退出</button>
  </div>
</div>

<script>
// ─── Slide Data ───────────────────────────────────────────────────
const BASE = 'origin_image/';

const slides = [
  {
    title: 'AI 助攻！課諮師 AI 核心技能培養與適性輔導實務',
    img: BASE + 'slide_01.png',
    speech: `各位夥伴老師大家早。能在今天這個場合與來自全台各高中的課諮同儕相聚，心裡其實有些感動。108 課綱走到現在，相信大家對課諮師這個角色的重量，有了愈來愈深的體會——不只是解讀簡章的資訊員，更是陪著孩子釐清方向的那個人。

今天，我們不是要讓科技取代這份溫度，而是要讓 AI 成為我們最可靠的後援，把繁瑣的資料比對、規章核對交給工具，把珍貴的時間與心力，留給諮詢室裡那些正在迷惘的孩子。

本次研習，我們將聚焦在如何透過封閉式 AI 技術，培養課諮師專屬的「科技引路能力」。這是我們在麗山高中實際走過的路，帶著真實教學現場的溫度，分享給各位。`
  },
  {
    title: '今日研習地圖',
    img: BASE + 'slide_02.png',
    speech: `在進入各個實戰模組之前，我們先一起看整天的學習地圖。從建立對 AI 的正確認識、避免被「幻覺」誤導，到五個核心技能的逐一演練——資料檢索、晤談模擬、歷程初評、落點分析，一路走到行政優化——每個模組都備有具體的操作範例，讓各位帶著走回去用。

這張地圖的設計邏輯，是從「理解工具是什麼」出發，慢慢走到「知道自己在哪個場景下怎麼用它」。希望今天結束後，各位帶回去的不只是幾個提示詞，而是一套可以持續運作的課諮輔助系統。

整個研習的節奏是循序漸進的，理論部分盡量簡短，實戰的比重會更多一些。`
  },
  {
    title: '課諮師在高中三年的工作任務地圖',
    img: BASE + 'slide_03.png',
    speech: `工具再好，也要先清楚自己在做什麼。在進入操作之前，我們稍微拉開視野，把課諮師在高中三年的工作任務梳理一遍。

高一做的是定向與探索，數 A 數 B 的選擇、18 學群的初步認識、自主學習計畫的啟動，都發生在這個階段；高二走向深化與確認，學生開始面對選組轉班的抉擇，加深加廣選修的配課也在這個時期形成；到了高三，就進入整合與衝刺，學分檢核、落點分析、面試準備，幾乎同步壓下來。

這張三年工作地圖，不只是複習，更是我們後續建置 AI 知識庫時的架構依據——用來決定「哪些文件要上傳、哪些情境要預先設定」。`
  },
  {
    title: '課諮第一線：被行政資料淹沒的專業教師',
    img: BASE + 'slide_04.png',
    speech: `在開始談工具之前，我想先說說大家都懂的那種感受。每年簡章一改，就要重新翻閱幾百頁的 PDF；學生和家長問的問題，往往和去年一模一樣，但每次回答還是要花一樣多的時間；更讓人惋惜的是，當處室同事異動，過去積累的諮詢經驗和常見問答，常常就這樣隨著人員的離開而消失。

這三件事——資訊超載、重複答詢、行政記憶流失——並不是課諮師個人的效率問題，而是結構性的痛點。大家在第一線承受這些壓力，其實是整個制度設計的代價。

而這，正是我們今天要讓 AI 系統幫忙承接的地方。不是讓科技取代老師，而是讓科技幫我們把可以自動化的部分接走，騰出更多空間做只有人才能做的事。`
  },
  {
    title: '通用 AI 幻覺問題 vs. 封閉式專家 AI 優勢',
    img: BASE + 'slide_05.png',
    speech: `很多老師嘗試過用一般的 AI 工具來回答選課問題，卻發現它偶爾會「說出聽起來很合理、但根本不存在的規定」——這就是所謂的「幻覺」。在一般的生活應用裡，這也許只是個小麻煩；但在攸關學生升學方向的教育諮詢現場，卻是絕對不能接受的風險。

我們今天要學習的，是「封閉式專家 AI」的操作邏輯。以 NotebookLM 為例，它就像一個只被允許閱讀我們上傳資料的嚴謹助理，透過「Grounding 溯源技術」，不僅不會自行發揮，還會在每個回答後方標註引用頁碼。

這個差異，看起來是技術細節，實際上是教育信任的底線。有了頁碼引用，我們向家長說明時，隨時可以翻開原始文件當場核對，這才是課諮師在資訊時代應有的專業素養。`
  },
  {
    title: '實戰：五分鐘打造校級課諮 AI 系統',
    img: BASE + 'slide_06.png',

// ─── State ────────────────────────────────────────────────────────
let current = 0;
let isPlaying = false;
let playInterval = null;
let progressInterval = null;
let progressStart = null;
let speedSecs = 5;

// ─── Init ─────────────────────────────────────────────────────────
function init() {
  const strip = document.getElementById('thumb-strip');
  slides.forEach((s, i) => {
    const t = document.createElement('div');
    t.className = 'thumb' + (i === 0 ? ' active' : '');
    t.innerHTML = `<img src="${s.img}" alt="slide ${i+1}" loading="lazy">`;
    t.onclick = () => { goTo(i); };
    strip.appendChild(t);
  });
  render();
}

function render() {
  const s = slides[current];
  document.getElementById('main-slide').src = s.img;
  document.getElementById('counter').textContent = `${current+1} / ${slides.length}`;
  document.getElementById('speech-num').textContent = `SLIDE ${String(current+1).padStart(2,'0')}`;
  document.getElementById('speech-title').textContent = s.title;
  document.getElementById('speech-body').innerHTML = s.speech.trim().split('\n\n').map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === slides.length - 1;

  document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === current));
  const thumbs = document.querySelectorAll('.thumb');
  if (thumbs[current]) thumbs[current].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  document.getElementById('speech-body').scrollTop = 0;

  // fullscreen
  document.getElementById('fs-img').src = s.img;
  document.getElementById('fs-counter-text').textContent = `${current+1} / ${slides.length}`;
}

function goTo(i) {
  if (i < 0 || i >= slides.length) return;
  current = i;
  render();
  if (isPlaying) resetProgressBar();
}

function navigate(dir) { goTo(current + dir); }

// ─── Auto-play ────────────────────────────────────────────────────
function getSpeed() {
  return parseInt(document.getElementById('speed-select').value, 10) || 5;
}

function updateSpeed() {
  speedSecs = getSpeed();
  document.getElementById('fs-speed-select').value = speedSecs;
  if (isPlaying) { clearAutoPlay(); startAutoPlay(); }
}

function updateSpeedFromFs() {
  speedSecs = parseInt(document.getElementById('fs-speed-select').value, 10) || 5;
  document.getElementById('speed-select').value = speedSecs;
  if (isPlaying) { clearAutoPlay(); startAutoPlay(); }
}

function togglePlay() {
  isPlaying ? pausePlay() : startPlay();
}

function startPlay() {
  isPlaying = true;
  speedSecs = getSpeed();
  document.getElementById('play-btn').textContent = '⏸';
  document.getElementById('play-btn').classList.add('playing');
  document.getElementById('fs-play-btn').textContent = '⏸ 暫停';
  document.getElementById('fs-play-btn').classList.add('playing');
  startAutoPlay();
}

function pausePlay() {
  isPlaying = false;
  document.getElementById('play-btn').textContent = '▶';
  document.getElementById('play-btn').classList.remove('playing');
  document.getElementById('fs-play-btn').textContent = '▶ 自動播放';
  document.getElementById('fs-play-btn').classList.remove('playing');
  clearAutoPlay();
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('fs-progress-fill').style.width = '0%';
}

function startAutoPlay() {
  resetProgressBar();
  playInterval = setInterval(() => {
    if (current >= slides.length - 1) {
      pausePlay();
      return;
    }
    navigate(1);
    resetProgressBar();
  }, speedSecs * 1000);
}

function clearAutoPlay() {
  clearInterval(playInterval);
  clearInterval(progressInterval);
  playInterval = null; progressInterval = null;
}

function resetProgressBar() {
  clearInterval(progressInterval);
  progressStart = Date.now();
  const dur = speedSecs * 1000;
  progressInterval = setInterval(() => {
    const pct = Math.min(100, ((Date.now() - progressStart) / dur) * 100);
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('fs-progress-fill').style.width = pct + '%';
    if (pct >= 100) clearInterval(progressInterval);
  }, 80);
}

// ─── Fullscreen ───────────────────────────────────────────────────
function enterFullscreen() {
  document.getElementById('fullscreen-overlay').classList.add('active');
  render();
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
}

function exitFullscreen() {
  document.getElementById('fullscreen-overlay').classList.remove('active');
  if (document.exitFullscreen) document.exitFullscreen();
}

function fsNavigate(dir) { navigate(dir); }

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) {
    document.getElementById('fullscreen-overlay').classList.remove('active');
  }
});

// ─── Home ─────────────────────────────────────────────────────────
function goHome() {
  pausePlay();
  goTo(0);
  // scroll thumb strip to start
  document.getElementById('thumb-strip').scrollLeft = 0;
}

// ─── Keyboard ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') navigate(-1);
  else if (e.key === 'Escape') exitFullscreen();
  else if (e.key === 'f' || e.key === 'F') enterFullscreen();
  else if (e.key === ' ') { e.preventDefault(); togglePlay(); }
  else if (e.key === 'Home') goHome();
});

// ─── Start ────────────────────────────────────────────────────────
init();
</script>
